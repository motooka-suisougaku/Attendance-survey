<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>来場登録｜元岡中学校吹奏楽部 定期演奏会 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#c9a84c;--gold-light:#f0d080;--gold-dark:#8a6a20;
    --ink:#1a1208;--parchment:#fdf6e3;--parchment-dark:#f5e8c0;
    --red:#c0392b;--teal:#2a7a6a;--shadow:rgba(100,60,0,0.15);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--parchment);color:var(--ink);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(180,140,60,0.03) 40px,rgba(180,140,60,0.03) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(180,140,60,0.03) 40px,rgba(180,140,60,0.03) 41px)}
  .wrapper{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:48px 24px 80px}
  .header{text-align:center;margin-bottom:40px}
  .header-crest{font-size:44px;margin-bottom:12px;animation:pulse 3s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  .header-label{font-size:11px;letter-spacing:4px;color:var(--gold-dark);text-transform:uppercase;margin-bottom:10px}
  .header-title{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;line-height:1.7;margin-bottom:6px}
  .header-date{font-size:15px;color:var(--red);font-weight:700;letter-spacing:2px;margin-bottom:8px}
  .header-sub{font-size:13px;color:#6b5a30;line-height:1.8}
  .card{background:white;border-radius:20px;padding:40px;box-shadow:0 4px 32px var(--shadow);
    border:1px solid rgba(180,140,60,0.2);position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-light),var(--gold),var(--gold-dark))}
  .form-group{margin-bottom:24px}
  label{display:block;font-size:13px;font-weight:700;color:var(--gold-dark);letter-spacing:1px;margin-bottom:8px}
  .required-mark{color:var(--red);margin-left:4px}
  input[type="text"],select,textarea{width:100%;padding:14px 18px;border:1.5px solid rgba(180,140,60,0.3);
    border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:15px;color:var(--ink);
    background:var(--parchment);transition:all 0.3s;outline:none;resize:vertical}
  input:focus,select:focus,textarea:focus{border-color:var(--gold);background:white;box-shadow:0 0 0 3px rgba(201,168,76,0.15)}
  input::placeholder,textarea::placeholder{color:#b0a070;font-size:14px}
  .counter-row{display:flex;align-items:center;gap:16px}
  .counter-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--gold);background:white;
    font-size:22px;color:var(--gold-dark);cursor:pointer;display:flex;align-items:center;
    justify-content:center;transition:all 0.2s;flex-shrink:0;font-weight:700}
  .counter-btn:hover{background:var(--gold);color:white}
  .counter-display{font-family:'Noto Serif JP',serif;font-size:36px;font-weight:700;
    color:var(--gold-dark);min-width:60px;text-align:center;flex:1}
  .counter-unit{font-size:14px;color:#8a7040}
  .submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-dark));
    border:none;border-radius:12px;font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;
    color:white;cursor:pointer;letter-spacing:2px;transition:all 0.3s;margin-top:8px;
    text-shadow:0 1px 3px rgba(0,0,0,0.3)}
  .submit-btn:hover{box-shadow:0 6px 20px rgba(140,100,20,0.4);transform:translateY(-1px)}
  .submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
  .success-msg{display:none;text-align:center;padding:28px 16px;animation:fadeIn 0.5s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .success-icon{font-size:48px;margin-bottom:12px}
  .success-title{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;color:var(--teal);margin-bottom:8px}
  .success-text{font-size:14px;color:#555;line-height:1.9}
  .divider{display:flex;align-items:center;gap:12px;margin:28px 0}
  .divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .divider-ornament{font-size:16px;color:var(--gold)}
  .spinner{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,0.4);
    border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:540px){.wrapper{padding:28px 16px 60px}.card{padding:28px 18px}.header-title{font-size:18px}}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="header-crest">🎺</div>
    <div class="header-label">Annual Concert 2026</div>
    <h1 class="header-title">元岡中学校吹奏楽部<br>定期演奏会 2026</h1>
    <div class="header-date">2026年 3月21日（土）14:00 開演</div>
    <p class="header-sub">ご来場予定の方はこちらからご登録ください。<br>入場は無料です。</p>
  </div>

  <div class="card">
    <div id="form-body">
      <div class="form-group">
        <label>お名前<span class="required-mark">*</span></label>
        <input type="text" id="name" placeholder="例：元岡 太郎" maxlength="50">
      </div>
      <div class="form-group">
        <label>来場予定人数<span class="required-mark">*</span></label>
        <div class="counter-row">
          <button class="counter-btn" onclick="changeCount(-1)">−</button>
          <div class="counter-display" id="count-display">1</div>
          <span class="counter-unit">名</span>
          <button class="counter-btn" onclick="changeCount(1)">＋</button>
        </div>
      </div>
      <div class="form-group">
        <label>部員との関係（任意）</label>
        <select id="relation">
          <option value="">選択してください（任意）</option>
          <option value="保護者・家族">部員の保護者・家族</option>
          <option value="友人・知人">部員の友人・知人</option>
          <option value="先生・関係者">先生・関係者</option>
          <option value="OB・OG">OB・OG</option>
          <option value="一般来場">その他・一般来場</option>
        </select>
      </div>
      <div class="form-group">
        <label>メッセージ（任意）</label>
        <textarea id="comment" rows="2" placeholder="楽しみにしています！など…"></textarea>
      </div>
      <button class="submit-btn" id="submit-btn" onclick="submitForm()">✦ 来場を登録する ✦</button>
    </div>

    <div class="success-msg" id="success-msg">
      <div class="success-icon">🎶</div>
      <div class="success-title">ご登録ありがとうございます！</div>
      <p class="success-text">
        来場予定として記録しました。<br>
        当日のご来場を部員一同、心よりお待ちしております。<br><br>
        <strong>2026年3月21日（土）14:00 開演</strong><br>
        元岡中学校 体育館
      </p>
      <div class="divider" style="margin-top:24px">
        <div class="divider-line"></div><div class="divider-ornament">♪</div><div class="divider-line"></div>
      </div>
      <button class="submit-btn" style="margin-top:16px" onclick="resetForm()">別の方の登録をする</button>
    </div>
  </div>

  <div class="divider" style="margin-top:48px">
    <div class="divider-line"></div><div class="divider-ornament">🎵</div><div class="divider-line"></div>
  </div>
  <p style="text-align:center;font-size:12px;color:#b0a070;letter-spacing:1px">© 2026 福岡市立元岡中学校 吹奏楽部</p>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwymJv-eXkht8UUIfU34SwGXe6K8acIrp8XWLxKl-6HxcjOsXjc0ip1i_ggemvSaHKq/exec';

let attendeeCount = 1;

function changeCount(delta) {
  attendeeCount = Math.max(1, Math.min(20, attendeeCount + delta));
  document.getElementById('count-display').textContent = attendeeCount;
}

async function submitForm() {
  const name = document.getElementById('name').value.trim();
  if (!name) { alert('お名前を入力してください'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>登録中...';

  const data = {
    datetime: new Date().toLocaleString('ja-JP', {
      year:'numeric', month:'2-digit', day:'2-digit',
      hour:'2-digit', minute:'2-digit'
    }),
    name: name,
    count: attendeeCount,
    relation: document.getElementById('relation').value || '未回答',
    comment: document.getElementById('comment').value.trim() || ''
  };

  try {
    // GASはCORSの関係でno-corsで送信
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    // no-corsは結果が取れないので送信できたとみなす
    document.getElementById('form-body').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
  } catch(e) {
    alert('送信に失敗しました。通信状況を確認してもう一度お試しください。');
    btn.disabled = false;
    btn.innerHTML = '✦ 来場を登録する ✦';
  }
}

function resetForm() {
  document.getElementById('name').value = '';
  document.getElementById('relation').value = '';
  document.getElementById('comment').value = '';
  attendeeCount = 1;
  document.getElementById('count-display').textContent = '1';
  document.getElementById('form-body').style.display = '';
  document.getElementById('success-msg').style.display = 'none';
  const btn = document.getElementById('submit-btn');
  btn.disabled = false;
  btn.innerHTML = '✦ 来場を登録する ✦';
}
</script>
</body>
</html>
